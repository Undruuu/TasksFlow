<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Вход — TaskFlow</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="/static/css/style.css">
    </head>
    <body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-white">TaskFlow</h1>
                <p class="text-purple-300/70 mt-1">Войдите в аккаунт</p>
            </div>

            <div class="bg-white/5 backdrop-blur-lg p-8 rounded-2xl border border-white/10 shadow-2xl">
                <div class="flex gap-1 bg-white/5 rounded-lg p-1 mb-6">
                    <button id="loginTab" class="flex-1 py-2 px-4 rounded-lg text-sm font-medium transition bg-purple-600 text-white">
                        Вход
                    </button>
                    <button id="registerTab" class="flex-1 py-2 px-4 rounded-lg text-sm font-medium transition text-purple-300 hover:text-white">
                        Регистрация
                    </button>
                </div>

                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-purple-200 mb-1">Email</label>
                        <input type="email" id="loginEmail" required
                            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-purple-300/50 focus:outline-none focus:border-purple-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-purple-200 mb-1">Пароль</label>
                        <input type="password" id="loginPassword" required
                            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-purple-300/50 focus:outline-none focus:border-purple-500 transition">
                    </div>
                    <button type="submit" 
                            class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-semibold rounded-lg transition shadow-lg shadow-purple-500/30">
                        Войти
                    </button>
                </form>

                <form id="registerForm" class="space-y-4 hidden">
                    <div>
                        <label class="block text-sm font-medium text-purple-200 mb-1">Имя пользователя</label>
                        <input type="text" id="registerUsername" required
                            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-purple-300/50 focus:outline-none focus:border-purple-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-purple-200 mb-1">Email</label>
                        <input type="email" id="registerEmail" required
                            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-purple-300/50 focus:outline-none focus:border-purple-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-purple-200 mb-1">Пароль</label>
                        <input type="password" id="registerPassword" required minlength="6"
                            class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg text-white placeholder-purple-300/50 focus:outline-none focus:border-purple-500 transition">
                    </div>
                    <button type="submit" 
                            class="w-full py-3 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-semibold rounded-lg transition shadow-lg shadow-emerald-500/30">
                        Создать аккаунт
                    </button>
                </form>

                <div id="message" class="mt-4 text-sm text-center hidden"></div>
            </div>

            <p class="text-center text-purple-300/50 text-sm mt-6">
                Демо-проект для портфолио Junior DevOps
            </p>
        </div>

        <script type="module" src="/js/login.js"></script>
    </body>
</html>
