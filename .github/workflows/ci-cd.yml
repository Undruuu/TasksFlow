name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: taskflow-backend
  NGINX_IMAGE_NAME: taskflow-nginx

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          cd app
          pip install flake8
      
      - name: Run linting
        run: |
          cd app
          flake8 . --max-line-length=120 --ignore=E501,W503,E302,E303,W293,F401,W292,W291

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          cd app
          pip install pytest
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          cd app
          pytest || echo "No tests yet"

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set lowercase username
        id: username
        run: |
          echo "LOWERCASE_USER=$(echo '${{ github.actor }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.username.outputs.LOWERCASE_USER }}/${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ steps.username.outputs.LOWERCASE_USER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}
      
      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.nginx
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.username.outputs.LOWERCASE_USER }}/${{ env.NGINX_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ steps.username.outputs.LOWERCASE_USER }}/${{ env.NGINX_IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set lowercase username
        id: username
        run: |
          echo "LOWERCASE_USER=$(echo '${{ github.actor }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      
      - name: Create .env on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/TasksFlow
            cat > .env << EOF
            POSTGRES_USER=taskflow_user
            POSTGRES_PASSWORD=strong_password_here
            POSTGRES_DB=taskflow
            SECRET_KEY=your_super_secret_key
            ACCESS_TOKEN_EXPIRE_MINUTES=30
            EOF
      
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/TasksFlow
            git pull origin main
            
            sed -i 's|image: backend|image: ghcr.io/${{ steps.username.outputs.LOWERCASE_USER }}/taskflow-backend:latest|g' docker-compose.yml
            sed -i 's|image: nginx|image: ghcr.io/${{ steps.username.outputs.LOWERCASE_USER }}/taskflow-nginx:latest|g' docker-compose.yml
            
            docker compose down
            docker compose pull
            docker compose up -d
            docker system prune -f